<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>视频测试</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .video { margin: 20px 0; padding: 20px; background: white; border-radius: 10px; }
        video { max-width: 100%; background: #000; }
        .info { background: #e3f2fd; padding: 15px; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🎬 视频播放测试</h1>
    
    <div class="video">
        <h2>测试页面</h2>
        <p>如果视频无法播放，请查看下面的诊断信息</p>
    </div>
    
    <div class="video">
        <h2>诊断信息</h2>
        <div class="info">
            <p><strong>浏览器：</strong><span id="browser"></span></p>
            <p><strong>MP4 支持：</strong><span id="mp4"></span></p>
            <p><strong>MOV 支持：</strong><span id="mov"></span></p>
        </div>
    </div>
    
    <script>
        document.getElementById('browser').textContent = navigator.userAgent;
        const v = document.createElement('video');
        document.getElementById('mp4').textContent = v.canPlayType('video/mp4') ? '✅ 支持' : '❌ 不支持';
        document.getElementById('mov').textContent = v.canPlayType('video/quicktime') ? '✅ 支持' : '❌ 不支持';
    </script>
</body>
</html>
