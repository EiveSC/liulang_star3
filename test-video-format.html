<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频格式对比测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; }
        .video-compare { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; margin: 20px 0; }
        .video-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .video-card h3 { color: #667eea; margin-bottom: 15px; }
        video { width: 100%; border-radius: 10px; background: #000; }
        .info { background: #f0f3ff; padding: 15px; margin-top: 15px; border-radius: 8px; font-size: 14px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 8px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 视频格式对比测试</h1>
        
        <div class="video-compare">
            <!-- Video 01 -->
            <div class="video-card">
                <h3>📹 视频 1 - 原始格式</h3>
                <video controls preload="metadata">
                    <source src="videos/video01.mov" type="video/quicktime">
                    您的浏览器不支持视频播放
                </video>
                <div class="info">
                    <strong>格式：</strong>MOV (原始)<br>
                    <strong>测试：</strong>点击播放，检查是否流畅
                </div>
            </div>
            
            <div class="video-card">
                <h3>✅ 视频 1 - 网页优化格式</h3>
                <video controls preload="auto">
                    <source src="videos/video01_web.mp4" type="video/mp4">
                    您的浏览器不支持视频播放
                </video>
                <div class="info">
                    <strong>格式：</strong>MP4 (H.264 + AAC)<br>
                    <strong>优化：</strong>Faststart 流式播放<br>
                    <strong>推荐：</strong>✅ 使用此版本
                </div>
            </div>
            
            <!-- Video 02 -->
            <div class="video-card">
                <h3>📹 视频 2 - 原始格式</h3>
                <video controls preload="metadata">
                    <source src="videos/video02.mov" type="video/quicktime">
                    您的浏览器不支持视频播放
                </video>
                <div class="info">
                    <strong>格式：</strong>MOV (原始)<br>
                    <strong>测试：</strong>点击播放，检查是否流畅
                </div>
            </div>
            
            <div class="video-card">
                <h3>✅ 视频 2 - 网页优化格式</h3>
                <video controls preload="auto">
                    <source src="videos/video02_web.mp4" type="video/mp4">
                    您的浏览器不支持视频播放
                </video>
                <div class="info">
                    <strong>格式：</strong>MP4 (H.264 + AAC)<br>
                    <strong>优化：</strong>Faststart 流式播放<br>
                    <strong>推荐：</strong>✅ 使用此版本
                </div>
            </div>
        </div>
        
        <div class="video-card" style="margin-top: 30px;">
            <h3>📊 浏览器信息</h3>
            <div class="info">
                <p><strong>浏览器：</strong><span id="browser"></span></p>
                <p><strong>MP4 支持：</strong><span id="mp4-support"></span></p>
                <p><strong>MOV 支持：</strong><span id="mov-support"></span></p>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('browser').textContent = navigator.userAgent;
        const video = document.createElement('video');
        
        const mp4Support = video.canPlayType('video/mp4');
        document.getElementById('mp4-support').textContent = mp4Support ? '✅ 支持' : '❌ 不支持';
        
        const movSupport = video.canPlayType('video/quicktime');
        document.getElementById('mov-support').textContent = movSupport ? '✅ 支持' : '❌ 不支持';
    </script>
</body>
</html>
